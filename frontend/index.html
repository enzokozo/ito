<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Ito - Teste de Lobby</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        #chat { height: 300px; width: 400px; border: 1px solid #ccc; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <h2>Lobby do Ito</h2>
    
    <div id="setup">
        <input type="text" id="playerName" placeholder="Seu Nome" autocomplete="off">
        <button onclick="connect()">Entrar no Jogo</button>
    </div>

    <div id="gameArea" style="display: none;">
        <div id="chat"></div>
        <input type="text" id="messageInput" placeholder="Digite uma mensagem..." autocomplete="off">
        <button onclick="sendMessage()">Enviar</button>
    </div>

    <script>
        let ws;

        function connect() {
            const name = document.getElementById("playerName").value;
            if (!name) return alert("Digite um nome!");

            // Conecta no túnel WebSocket do FastAPI
            ws = new WebSocket(`ws://127.0.0.1:8000/ws/${name}`);

            ws.onopen = () => {
                document.getElementById("setup").style.display = "none";
                document.getElementById("gameArea").style.display = "block";
            };

            // Toda vez que o servidor mandar algo, escrevemos na tela
            ws.onmessage = (event) => {
                const chat = document.getElementById("chat");
                chat.innerHTML += `<p>${event.data}</p>`;
                chat.scrollTop = chat.scrollHeight;
            };
        }

        function sendMessage() {
            const input = document.getElementById("messageInput");
            if (input.value && ws) {
                ws.send(input.value);
                input.value = "";
            }
        }
    </script>
</body>
</html>
